<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <title>Cat Summoner - 設定</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 520px;
      margin: 32px auto;
      padding: 0 16px;
      color: #222;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .row {
      margin: 16px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 14px;
    }

    input[type="number"] {
      width: 80px;
      padding: 4px 6px;
    }

    input[type="range"] {
      width: 200px;
    }

    .hint {
      color: #666;
      font-size: 12px;
    }

    #status {
      margin-top: 16px;
      min-height: 1.2em;
      color: #0a0;
      font-size: 13px;
    }

    button {
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Cat Summoner 設定</h1>
  <p class="hint">ショートカット: <b>Ctrl+Shift+H</b>（Mac: <b>Cmd+Shift+H</b>）で即召喚</p>

  <div class="row">
    <input type="checkbox" id="soundEnabled" />
    <label for="soundEnabled">鳴き声を有効にする</label>
  </div>

  <div class="row">
    <label for="volume">音量</label>
    <input type="range" id="volume" min="0" max="1" step="0.05" />
    <span id="volumeLabel"></span>
  </div>

  <div class="row">
    <input type="checkbox" id="timerEnabled" />
    <label for="timerEnabled">タイマーで自動召喚する</label>
  </div>

  <div class="row">
    <label for="intervalMinutes">表示間隔（分）</label>
    <input type="number" id="intervalMinutes" min="1" max="1440" step="1" />
  </div>

  <div class="row">
    <button id="save">保存</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>

</html>
